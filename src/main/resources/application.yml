server:
  # 服务器的HTTP端口，默认为8080
  port: -1
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    org.springframework: warn

spring:
  application:
    name: mrcp-proxy

ws:
  port: 8854
  ws-path: /ws/v1
  tts-url: ws://192.168.3.200:11996/tts_stream
  asr-url: ws://192.168.3.200:10095
  asr-audio-save-enabled: true
  asr-audio-save-dir: audio/asr
  tts-audio-save-enabled: true
  tts-audio-save-dir: audio/tts

